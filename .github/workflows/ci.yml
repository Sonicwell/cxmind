name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ie-test:
    name: IE (Go)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
      clickhouse:
        image: clickhouse/clickhouse-server
        ports: ['9000:9000', '8123:8123']
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: ie/go.sum

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev libopus-dev libopusfile-dev

      - name: Run tests
        working-directory: ie
        env:
          REDIS_ADDR: localhost:6379
          CLICKHOUSE_DSN: clickhouse://default:@localhost:9000/default
        run: |
          go mod download
          go test -v -race -coverprofile=coverage.out ./...

      - name: Coverage summary
        working-directory: ie
        run: go tool cover -func=coverage.out | tail -1

  simulator-build:
    name: Simulator (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: simulator/go.sum

      - name: Build
        working-directory: simulator
        run: go build -o simulator_go .

  sniffer-build:
    name: Sniffer (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: sniffer/go.sum

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev libopus-dev libopusfile-dev

      - name: Build & Test
        working-directory: sniffer
        run: |
          go mod download
          go build -o sniffer ./cmd/sniffer
          go test -v ./... 2>/dev/null || echo "No tests yet"
