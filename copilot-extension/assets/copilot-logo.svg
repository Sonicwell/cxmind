<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 圆角背景 - 紫色渐变 -->
  <rect x="4" y="4" width="120" height="120" rx="26" ry="26" fill="url(#bg)"/>
  <!-- 绿色圆环 - 留足呼吸空间 -->
  <circle cx="64" cy="64" r="44" fill="none" stroke="#10b981" stroke-width="4" stroke-linecap="round" stroke-dasharray="254 24"/>
  <!-- 薰衣草色音波条 -->
  <g filter="url(#glow)" opacity="0.9">
    <rect x="42" y="50" width="8" height="28" rx="4" fill="#c4b5fd"/>
    <rect x="53" y="40" width="8" height="48" rx="4" fill="#c4b5fd"/>
    <rect x="64" y="34" width="8" height="60" rx="4" fill="#c4b5fd"/>
    <rect x="75" y="42" width="8" height="44" rx="4" fill="#c4b5fd"/>
    <rect x="86" y="52" width="8" height="24" rx="4" fill="#c4b5fd"/>
  </g>
  <!-- AI 星芒 -->
  <path d="M94 30 L96 24 L98 30 L104 32 L98 34 L96 40 L94 34 L88 32 Z" fill="white" opacity="0.85"/>
</svg>
