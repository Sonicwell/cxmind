version: '3.8'

services:
  ie:
    build: ./ie
    container_name: cxmind-community-ie
    ports:
      - "8080:8080"
      - "5060:5060/udp"
    environment:
      - CLICKHOUSE_DSN=clickhouse://default:@clickhouse:9000/cxmi
      - REDIS_ADDR=redis:6379
      - API_URL=http://app-server:3000
    depends_on:
      - clickhouse
      - redis
      - app-server

  admin-ui:
    build: ./admin-ui
    container_name: cxmind-community-admin-ui
    ports:
      - "5173:80"
    depends_on:
      - app-server

  app-server:
    image: cxmind/app-server:community
    container_name: cxmind-community-app-server
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/cxmi
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CLICKHOUSE_HOST=http://clickhouse:8123
      - CLICKHOUSE_DB=cxmi
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
      - FRONTEND_URL=http://localhost:5173
      - JWT_SECRET=community-secret-change-me
      - NODE_ENV=production
    depends_on:
      - mongo
      - redis
      - clickhouse

  mongo:
    image: mongo:7
    container_name: cxmind-community-mongo
    ports:
      - "27017:27017"
    volumes:
      - cxmind-mongo-data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro

  redis:
    image: redis:7-alpine
    container_name: cxmind-community-redis
    ports:
      - "6379:6379"

  clickhouse:
    image: clickhouse/clickhouse-server:24.12.6.70
    container_name: cxmind-community-clickhouse
    environment:
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - cxmind-clickhouse-data:/var/lib/clickhouse
      - ./clickhouse-init.sql:/docker-entrypoint-initdb.d/clickhouse-init.sql:ro

volumes:
  cxmind-mongo-data:
  cxmind-clickhouse-data:
