syntax = "proto3";

package ser;

option go_package = "github.com/cxmind/ingestion-go/internal/ser/pb";

service EmissionAnalyzer {
  rpc Analyze(AnalyzeRequest) returns (AnalyzeResponse) {}
}

message AnalyzeRequest {
  string call_id = 1;
  bytes audio_data = 2; // Float32 little-endian PCM data
  int32 sample_rate = 3;
}

message EmotionResult {
  string emotion = 1;
  float confidence = 2;
  float arousal = 3;
  float valence = 4;
}

message AnalyzeResponse {
  repeated EmotionResult emotions = 1;
  string dominant = 2;
  float avg_arousal = 3;
  float avg_valence = 4;
}
