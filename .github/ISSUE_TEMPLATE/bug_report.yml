name: Bug Report
description: Create a report to help us improve
title: "[BUG] "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what happens...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '....'
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: CXMind version (e.g., v1.0.0 or commit hash if built from source)
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment Info
      description: OS, Go/Node versions, Docker vs Bare-metal
      value: |
        - OS: 
        - Go Version: 
        - Deployment: Docker Compose / Binaries
